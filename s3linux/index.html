<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./xterm.css" />
        <link href="./style.css" rel="stylesheet" />
        <script src="./xterm.js"></script>
        <script src="./tab.js"></script>
    </head>
    <body>
        <div class="tab">
            <button class="tablinks" onclick="openTool(event, 'S3LinuxTerm')">Terminal</button>
            <button class="tablinks" onclick="openTool(event, 'S3LinuxFlasher')">Flasher</button>
        </div>
        <div id="S3LinuxTerm" class="tabcontent">
            <button id="connect">Connect</button>
            <select name="speed" id="SerialSpeed">
                <option value="1200">1200</option>
                <option value="2400">2400</option>
                <option value="4800">4800</option>
                <option value="9600">9600</option>
                <option value="19200">19200</option>
                <option value="38400">38400</option>
                <option value="57600">57600</option>
                <option value="115200">115200</option>
            </select>
            <div id="terminal"></div>
        </div>
        <div id="S3LinuxFlasher" class="tabcontent">
            <p>Beans!</p>
        </div>
    </body>
    <script>
        var term = new Terminal();
        term.open(document.getElementById('terminal'));

        let port;
        let reader;
        let inputDone;
        let inputStream;
        let outputDone;
        let outputStream;

        document.getElementById("connect").addEventListener("click", connect);
        async function connect() {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });

            let decoder = new TextDecoderStream();
            inputDone = port.readable.pipeTo(decoder.writable);
            inputStream = decoder.readable;
            
            reader = inputStream.getReader();

            const encoder = new TextEncoderStream();
            outputDone = encoder.readable.pipeTo(port.writable);
            outputStream = encoder.writable;

            term.onData(e => {
                const writer = outputStream.getWriter();
                writer.write(e);
                writer.releaseLock();
            });

            readLoop();
        }

        async function readLoop() {
            // CODELAB: Add read loop here.
            while (true) {
                const { value, done } = await reader.read();
                if (value) {
                    term.write(value);
                }
                if (done) {
                    console.log('[readLoop] DONE', done);
                }
            }
        }
    </script>
</html>
